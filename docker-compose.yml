services:

  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    restart: always
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: tucc
      APP_USER_PASSWORD: tucc
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./tucc-monolito/src/main/resources/db/oracle-setup.sql:/container-entrypoint-initdb.d/setup/01-setup.sql:z
      - ./tucc-monolito/src/main/resources/db/oracle-init.sql:/container-entrypoint-initdb.d/02-init.sql:z
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  kafka:
    image: apache/kafka:3.9.0
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tucc
      POSTGRES_USER: tucc
      POSTGRES_PASSWORD: tucc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tucc -d tucc"]
      interval: 10s
      timeout: 5s
      retries: 5

  tucc-sync-db-producer:
    build:
      context: ./tucc-sync-db-producer
      dockerfile: Dockerfile
    restart: always
    depends_on:
      oracle-xe:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ORACLE_HOST: oracle-xe
      ORACLE_PORT: 1521
      ORACLE_DBNAME: XE
      ORACLE_PDB: XEPDB1
      ORACLE_USER: system
      ORACLE_PASSWORD: oracle
      ORACLE_SCHEMA: TUCC

  tucc-sync-db-consumer:
    build:
      context: ./tucc-sync-db-consumer
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tucc
      POSTGRES_USER: tucc
      POSTGRES_PASSWORD: tucc

  tucc-core:
    build:
      context: ./tucc-core
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tucc
      POSTGRES_USER: tucc
      POSTGRES_PASSWORD: tucc

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: tucc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  tucc-monolito:
    build:
      context: ./tucc-monolito
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8090:8080"
    depends_on:
      oracle-xe:
        condition: service_healthy
    environment:
      ORACLE_HOST: oracle-xe
      ORACLE_PORT: 1521
      ORACLE_DB: XEPDB1
      ORACLE_USER: tucc
      ORACLE_PASSWORD: tucc

volumes:
  oracle-data:
  postgres-data:
